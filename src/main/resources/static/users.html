<!doctype html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>User Management</title>
  <link rel='stylesheet' href='/css/app.css' />
</head>
<body>
  <div id='topNav'></div>
  <div class='container'>
    <div class='card'>
      <h2>User Management</h2>
      <p class='small'>Manage staff accounts, roles, and active status.</p>
      <div class='inline'>
        <input id='userSearch' placeholder='Search name or email' />
      </div>
      <form id='createUserForm' class='inline'>
        <input id='email' placeholder='email' required />
        <input id='password' placeholder='password' required />
        <input id='fullName' placeholder='full name' required />
        <select id='role'>
          <option>SUPER_ADMIN</option><option>COMPANY_ADMIN</option><option>MANAGER</option><option>SUPERVISOR</option><option>ACCOUNTING</option><option>EMPLOYEE</option>
        </select>
        <button type='submit'>Add User</button>
      </form>
      <div class='table-wrap'>
        <table>
          <thead><tr><th>Full Name</th><th>Email</th><th>Department</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id='usersBody'></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src='/js/storage.js'></script><script src='/js/utils.js'></script><script src='/js/api.js'></script><script src='/js/app.js'></script><script src='/js/users.js'></script>
</body>
</html>
