<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>QMS Destinations</title><link rel="stylesheet" href="/css/app.css"/></head>
<body>
<div id="topNav" class="topbar"></div>
<div class="container"><div class="grid">
<div class="col-4 card">
<h3 id="destinationFormTitle">Create Destination</h3>
<label>Company Transaction</label><select id="destinationTransactionId"></select>
<label>Code</label><input id="destinationCode"/>
<label>Name</label><input id="destinationName"/>
<label>Subtitle</label><input id="destinationSubtitle"/>
<label>Queue Type ID</label><input id="destinationQueueTypeId" type="number"/>
<label>Sort Order</label><input id="destinationSortOrder" type="number" value="0"/>
<label>Status</label><select id="destinationStatus"><option value="ACTIVE">ACTIVE</option><option value="INACTIVE">INACTIVE</option></select>
<button id="saveDestinationBtn">Save</button><button id="cancelDestinationEditBtn" class="secondary">Cancel Edit</button>
</div>
<div class="col-8 card">
<h3>Destinations</h3>
<label>Filter Company Transaction</label><select id="filterTransactionId"></select>
<div class="table-wrap"><table><thead><tr><th>Code</th><th>Name</th><th>Subtitle</th><th>QueueType</th><th>Sort</th><th>Status</th><th>Actions</th></tr></thead><tbody id="destinationsTableBody"></tbody></table></div>
</div>
<div class="col-12 card"><h3>Debug</h3><pre id="debugPanel">{}</pre></div>
</div></div>
<script src="/js/storage.js"></script><script src="/js/utils.js"></script><script src="/js/api.js"></script><script src="/js/app.js"></script><script src="/js/company-transaction-destinations.js"></script>
</body></html>
