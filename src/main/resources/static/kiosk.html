<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QMS Kiosk</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="kiosk-body">
  <div class="kiosk-page">
    <header class="kiosk-header">
      <h1 id="kioskTitle">QUEUING SYSTEM</h1>
      <div class="kiosk-clock">
        <div id="liveDate"></div>
        <div id="liveTime"></div>
      </div>
    </header>

    <main class="kiosk-main">
      <section id="companySection">
        <div id="companyGrid" class="company-grid"></div>
      </section>

      <section id="transactionSection" style="display:none;">
        <div id="selectedCompanyBadge" class="kiosk-company-label"></div>
        <div id="transactionButtons" class="transaction-list"></div>
      </section>

      <section id="crewSection" style="display:none;">
        <div class="crew-input-panel">
          <input id="crewIdentifierDisplay" class="crew-display" readonly />
          <div class="inline">
            <button id="crewBackspaceBtn" class="secondary">⌫</button>
            <button id="crewClearBtn" class="secondary">C</button>
            <button id="crewEnterBtn" class="success">ENTER</button>
          </div>
          <div class="keypad-grid" id="keypadGrid"></div>
          <input id="rfidCaptureInput" class="rfid-capture" autocomplete="off" />
          <p id="crewStatusMessage" class="small">Waiting for input...</p>
        </div>
      </section>

      <section id="destinationSection" style="display:none;">
        <h3 id="crewGreetingLine"></h3>
        <div id="destinationButtons" class="transaction-list"></div>
      </section>

      <section id="queueSection" class="card" style="display:none; margin-top: 16px;">
        <h3 id="selectedTransactionTitle">Queue Types</h3>
        <label>Queue Type</label>
        <select id="queueTypeId"></select>
        <button id="createTicketBtn" class="success">Create Ticket</button>
        <button id="printBtn" class="warn">Print Ticket</button>
        <div id="printablePanel"><em>No ticket created yet.</em></div>
      </section>
    </main>

    <footer class="kiosk-footer">
      <button id="refreshBtn" class="kiosk-refresh" aria-label="Refresh companies">↻</button>
      <p id="footerInstruction" class="kiosk-instruction">Please select your company</p>
      <div class="kiosk-footer-actions">
        <button id="backBtn" class="secondary">Back</button>
        <button id="homeBtn" class="secondary">Home</button>
      </div>
    </footer>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/kiosk.js"></script>
</body>
</html>
