<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QMS Kiosk</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="topNav" class="topbar"></div>
  <div class="container">
    <div class="grid">
      <div class="col-4 card">
        <h3>Kiosk Ticket Creation</h3>
        <label>Department ID</label>
        <input id="departmentId" type="number" />
        <button id="reloadRefBtn" class="secondary">Reload Kiosks/Queue Types</button>

        <label>Kiosk</label>
        <select id="kioskId"></select>

        <label>Queue Type</label>
        <select id="queueTypeId"></select>

        <button id="createTicketBtn" class="success">Create Ticket</button>
        <button id="printBtn" class="warn">Print Ticket</button>
      </div>

      <div class="col-8 card">
        <h3>Printable Ticket</h3>
        <div id="printablePanel"><em>No ticket created yet.</em></div>
      </div>

      <div class="col-12 card">
        <h3>Debug</h3>
        <pre id="debugPanel">{}</pre>
      </div>
    </div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/kiosk.js"></script>
</body>
</html>
