<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QMS Wallboard</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="wallboard-body">
  <main class="wallboard-layout">
    <section class="wallboard-upper">
      <div class="wb-block wb-called-block">
        <header class="wb-title-band">
          <h1>CALLED</h1>
        </header>
        <div class="wb-panel">
          <table class="wb-table wb-table-called">
            <thead>
              <tr>
                <th>TICKET NO.</th>
                <th>TERMINAL NO.</th>
                <th>TRANSACTION</th>
              </tr>
            </thead>
            <tbody id="calledBody"></tbody>
          </table>
        </div>
      </div>

      <div class="wb-block wb-onqueue-block">
        <header class="wb-title-band wb-title-band-with-filter">
          <h1>ON QUEUE <span id="onQueueCount">[0]</span></h1>
          <select id="wallboardFilter" class="wb-filter"></select>
        </header>
        <div class="wb-onqueue-panels">
          <div class="wb-panel">
            <table class="wb-table">
              <thead>
                <tr><th>TICKET NO.</th><th>TRANSACTION</th></tr>
              </thead>
              <tbody id="onQueueLeftBody"></tbody>
            </table>
          </div>
          <div class="wb-panel">
            <table class="wb-table">
              <thead>
                <tr><th>TICKET NO.</th><th>TRANSACTION</th></tr>
              </thead>
              <tbody id="onQueueRightBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <section class="wallboard-lower">
      <div class="wb-block">
        <header class="wb-title-band">
          <h1>NO SHOW <span id="noShowCount">[0]</span></h1>
        </header>
        <div class="wb-panel">
          <table class="wb-table wb-table-called">
            <thead>
              <tr><th>TICKET NO.</th><th>TERMINAL NO.</th><th>TRANSACTION</th></tr>
            </thead>
            <tbody id="noShowBody"></tbody>
          </table>
        </div>
      </div>

      <div class="wb-block">
        <header class="wb-title-band">
          <h1>ON-HOLD <span id="onHoldCount">[0]</span></h1>
        </header>
        <div class="wb-panel">
          <table class="wb-table">
            <thead>
              <tr><th>TICKET NO.</th><th>TRANSACTION</th></tr>
            </thead>
            <tbody id="onHoldBody"></tbody>
          </table>
        </div>
      </div>

      <div class="wb-block">
        <header class="wb-title-band">
          <h1>VISITOR/SUPPLIER <span id="visitorSupplierCount">[0]</span></h1>
        </header>
        <div class="wb-panel">
          <table class="wb-table">
            <thead>
              <tr><th>TICKET NO.</th><th>TRANSACTION</th></tr>
            </thead>
            <tbody id="visitorSupplierBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/storage.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/display.js"></script>
</body>
</html>
