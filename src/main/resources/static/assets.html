<!doctype html><html><head><meta charset='UTF-8'><title>Assets</title><link rel='stylesheet' href='/css/app.css'/></head>
<body><div id='topNav' class='topbar'></div><div class='container'><div class='card'><h3>Asset Management</h3>

<div class='table-wrap'><table><thead><tr><th>ID</th><th>Tag</th><th>Name</th><th>Type</th><th>Device Key</th><th>Status</th></tr></thead><tbody id='assetsBody'></tbody></table></div>
<pre id='debugPanel'></pre></div></div>
<script src='/js/storage.js'></script><script src='/js/utils.js'></script><script src='/js/api.js'></script><script src='/js/app.js'></script><script src='/js/assets.js'></script></body></html>
