<!doctype html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Asset Management</title>
  <link rel='stylesheet' href='/css/app.css' />
</head>
<body>
  <div id='topNav'></div>
  <div class='container'>
    <div class='card'>
      <h2>Asset Management</h2>
      <p class='small'>Manage kiosk and display assets with status and ownership metadata.</p>
      <div class='inline'>
        <input id='assetSearch' placeholder='Search asset name or tag' />
        <select id='assetTypeFilter'><option value=''>All Types</option><option>KIOSK</option><option>DISPLAY</option></select>
      </div>
      <form id='createAssetForm' class='inline'>
        <input id='assetTag' placeholder='asset tag' required />
        <input id='assetName' placeholder='asset name' required />
        <select id='assetType'><option>KIOSK</option><option>DISPLAY</option></select>
        <select id='status'><option>ACTIVE</option><option>INACTIVE</option><option>MAINTENANCE</option><option>RETIRED</option></select>
        <button type='submit'>Add Asset</button>
      </form>
      <div class='table-wrap'>
        <table>
          <thead><tr><th>Asset Name</th><th>Asset Tag</th><th>Type</th><th>Status</th><th>Department</th><th>Company</th><th>Device Key</th></tr></thead>
          <tbody id='assetsBody'></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src='/js/storage.js'></script><script src='/js/utils.js'></script><script src='/js/api.js'></script><script src='/js/app.js'></script><script src='/js/assets.js'></script>
</body>
</html>
