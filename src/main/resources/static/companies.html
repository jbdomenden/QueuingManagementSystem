<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QMS Companies</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="topNav" class="topbar"></div>
  <div class="container">
    <div class="grid">
      <div class="col-4 card">
        <h3 id="formTitle">Create Company</h3>
        <label>Company Code</label>
        <input id="companyCode" />
        <label>Company Name</label>
        <input id="companyName" />
        <label>Company Description</label>
        <input id="companyDescription" />
        <label>Card Size Type</label>
        <select id="cardSizeType">
          <option value="BIG">BIG</option>
          <option value="SMALL">SMALL</option>
        </select>
        <label>Display Order</label>
        <input id="displayOrder" type="number" min="0" value="0" />
        <label>Active</label>
        <select id="isActive">
          <option value="true">ACTIVE</option>
          <option value="false">INACTIVE</option>
        </select>
        <button id="saveBtn">Save Company</button>
        <button id="cancelEditBtn" class="secondary">Cancel Edit</button>
      </div>
      <div class="col-8 card">
        <h3>Companies</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Description</th>
                <th>Card Type</th>
                <th>Display Order</th>
                <th>Active</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="companiesTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="col-12 card">
        <h3>Debug</h3>
        <pre id="debugPanel">{}</pre>
      </div>
    </div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/companies.js"></script>
</body>
</html>
