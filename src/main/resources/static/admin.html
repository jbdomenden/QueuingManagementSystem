<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QMS Admin</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="topNav" class="topbar"></div>
  <div class="container">
    <div class="grid">
      <div class="col-4 card">
        <h3>Admin Filters</h3>
        <label>Department ID</label>
        <input id="departmentId" type="number" />
        <label>Date From</label>
        <input id="dateFrom" type="date" />
        <label>Date To</label>
        <input id="dateTo" type="date" />
        <label>Queue Type ID (optional)</label>
        <input id="queueTypeFilter" type="number" />
        <label>Status (optional)</label>
        <select id="statusFilter">
          <option value="">All</option>
          <option value="WAITING">WAITING</option>
          <option value="CALLED">CALLED</option>
          <option value="IN_SERVICE">IN_SERVICE</option>
          <option value="SKIPPED">SKIPPED</option>
          <option value="COMPLETED">COMPLETED</option>
        </select>
        <button id="refreshBtn">Refresh Live + Archived</button>
      </div>

      <div class="col-4 card">
        <h3>Archive Day Trigger</h3>
        <label>Service Date</label>
        <input id="archiveDate" type="date" />
        <button id="archiveBtn" class="warn">Archive Day</button>
      </div>

      <div class="col-4 card">
        <h3>Summary</h3>
        <div id="summaryCards"></div>
      </div>

      <div class="col-12 card">
        <h3>Live Tickets</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ticket #</th><th>Queue Type</th><th>Status</th><th>Queue Date</th><th>Queue Time</th><th>Queued At</th><th>Called At</th><th>Completed At</th><th>Window</th>
              </tr>
            </thead>
            <tbody id="liveTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="col-12 card">
        <h3>Archived Tickets</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ticket #</th><th>Queue Type</th><th>Status</th><th>Service Date</th><th>Queue Time</th><th>Queued At</th><th>Waiting</th><th>Served</th>
              </tr>
            </thead>
            <tbody id="archivedTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="col-12 card">
        <h3>Debug</h3>
        <pre id="debugPanel">{}</pre>
      </div>
    </div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
