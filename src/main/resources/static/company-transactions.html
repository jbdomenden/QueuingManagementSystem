<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QMS Company Transactions</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="topNav" class="topbar"></div>
  <div class="container">
    <div class="grid">
      <div class="col-4 card">
        <h3 id="transactionFormTitle">Create Company Transaction</h3>
        <label>Company</label>
        <select id="transactionCompanyId"></select>
        <label>Transaction Code</label>
        <input id="transactionCode" />
        <label>Transaction Name</label>
        <input id="transactionName" />
        <label>Subtitle (optional)</label>
        <input id="transactionSubtitle" />
        <label>Requires Crew Validation</label>
        <select id="requiresCrewValidation">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
        <label>Input Mode</label>
        <select id="inputMode">
          <option value="NONE">NONE</option>
          <option value="KEYPAD">KEYPAD</option>
          <option value="RFID">RFID</option>
          <option value="BOTH">BOTH</option>
        </select>
        <label>Sort Order</label>
        <input id="transactionSortOrder" type="number" min="0" value="0" />
        <label>Status</label>
        <select id="transactionStatus">
          <option value="ACTIVE">ACTIVE</option>
          <option value="INACTIVE">INACTIVE</option>
        </select>
        <button id="saveTransactionBtn">Save</button>
        <button id="cancelTransactionEditBtn" class="secondary">Cancel Edit</button>
      </div>

      <div class="col-8 card">
        <h3>Company Transactions</h3>
        <label>Filter by Company</label>
        <select id="filterCompanyId"></select>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Company</th>
                <th>Code</th>
                <th>Name</th>
                <th>Subtitle</th>
                <th>Sort Order</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="companyTransactionsTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="col-12 card">
        <h3>Debug</h3>
        <pre id="debugPanel">{}</pre>
      </div>
    </div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/company-transactions.js"></script>
</body>
</html>
